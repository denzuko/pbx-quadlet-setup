name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck bats

      - name: ShellCheck
        run: shellcheck -S style pbx_setup.sh

      - name: BATS unit tests
        run: bats tests/pbx_setup.bats

      # TODO v5.0: restore GPG signature verification once signing is implemented
      # - name: Verify GPG signature
      #   run: |
      #     gpg --import signing/pubkey.asc
      #     gpg --verify pbx_setup.sh.sig pbx_setup.sh

  pages:
    needs: lint-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build GitHub Pages site
        run: |
          mkdir -p _site
          cp docs/index.html _site/
          cp docs/pbx_setup.sh _site/
          # TODO v5.0: add pbx_setup.sh.sig and pubkey.asc once GPG signing implemented

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
